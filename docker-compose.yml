services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-backend:
    build: ./ai-backend
    volumes:
      - ai_models:/app/saved_models

  logic-backend:
    build: ./logic-backend
    depends_on:
      mysql:
        condition: service_healthy
      ai-backend:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PYTHON_BACKEND_URL: http://ai-backend:8000
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - logic-backend
    environment:
      BACKEND_URL: http://logic-backend:8080
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  ai_models:
